<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_V.1 - GEO-SCANNER</title>
    <script src="//unpkg.com/globe.gl"></script>
    <style>
        body { 
            margin: 0; background: #000; color: #00ffff; 
            font-family: 'Courier New', Courier, monospace; overflow: hidden;
        }

        #globeViz { position: absolute; top: 0; left: 0; z-index: 1; }

        /* Terminal Principal */
        .terminal-box {
            position: absolute; top: 20px; left: 20px; width: 350px; height: 90vh;
            border: 3px solid #ff00ff; background: rgba(0, 0, 0, 0.85);
            padding: 20px; z-index: 10; box-shadow: 0 0 15px #ff00ff;
            overflow-y: auto; scrollbar-width: thin; scrollbar-color: #ff00ff #000;
        }

        /* Consola de Lectura (Bottom Right) */
        .reader-box {
            position: absolute; bottom: 20px; right: 20px; width: 400px; height: 250px;
            border: 2px solid #00ff00; background: rgba(0, 20, 0, 0.9);
            padding: 15px; z-index: 20; box-shadow: 0 0 10px #00ff00;
            display: none; /* Oculta hasta que se selecciona una noticia */
            flex-direction: column;
        }

        .reader-header { border-bottom: 1px solid #00ff00; padding-bottom: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; color: #00ff00; }
        .reader-content { font-size: 0.9em; color: #00ff00; overflow-y: auto; flex-grow: 1; }
        .close-btn { cursor: pointer; color: #ff0000; }

        h2 { color: #00ffff; border-bottom: 2px solid #00ffff; padding-bottom: 10px; margin-top: 0; }
        .status-line { margin: 10px 0; font-weight: bold; }
        .active { color: #00ff00; }
        .node-info { color: #ff00ff; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .back-btn {
            display: none; background: #ff00ff; color: #000; padding: 8px 12px;
            font-weight: bold; cursor: pointer; margin-bottom: 15px; border: none; width: 100%; text-align: left;
        }

        .news-item {
            margin-bottom: 20px; padding: 10px; border-left: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.05); cursor: pointer; transition: 0.2s;
        }
        .news-item:hover { background: rgba(255, 0, 255, 0.1); border-left-color: #ff00ff; }
        .news-link { color: #ff00ff; text-decoration: none; font-size: 0.8em; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="globeViz"></div>

    <!-- TERMINAL PRINCIPAL -->
    <div class="terminal-box">
        <h2>SYSTEM_TERMINAL_V.1</h2>
        <div class="status-line">STATUS: <span class="active">ACTIVE</span></div>
        <div id="node-label" class="node-info">NODE: GLOBAL FEED</div>
        <button id="back-button" class="back-btn" onclick="resetToGlobal()">> RESET_CAMERA</button>
        <div id="news-container">
            <div class="status-line">> ESCANEANDO...</div>
        </div>
    </div>

    <!-- CONSOLA DE LECTURA -->
    <div id="news-reader" class="reader-box">
        <div class="reader-header">
            <span>DATA_DECRYPTOR_V.1</span>
            <span class="close-btn" onclick="closeReader()">[X]</span>
        </div>
        <div id="reader-body" class="reader-content">
            <!-- Contenido de la noticia -->
        </div>
    </div>

    <script>
        let world;
        let hoverD = null;
        let selectedCountry = null;
        const BASE_ROTATION_SPEED = 0.5;

        // Inicializar Globe
        world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
            .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
            .polygonSideColor(() => 'rgba(255, 0, 255, 0.2)')
            .polygonStrokeColor(() => '#ff00ff')
            .polygonCapColor(d => d === hoverD ? 'rgba(0, 255, 255, 0.3)' : 'rgba(0, 255, 255, 0.05)')
            .polygonAltitude(d => d === hoverD ? 0.06 : 0.00)
            
            // POINT LAYER para Bermuda y territorios pequeños
            .pointColor(() => '#ff00ff')
            .pointAltitude(0.07)
            .pointRadius(0.5)
            .pointsMerge(true)
            
            .onPolygonHover(poly => {
                hoverD = poly;
                world.polygonAltitude(world.polygonAltitude());
            })
            .onPolygonClick((polygon, event, { lat, lng }) => {
                const d = polygon.properties;
                selectNode(d.name, d.ISO_A3, lat, lng);
            })
            .onPointClick(pt => {
                // Caso especial para Bermuda clickada como punto
                selectNode(pt.name, pt.id, pt.lat, pt.lng);
            })
            .onGlobeClick(() => { if (selectedCountry) resetToGlobal(); });

        // Activar rotación
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = BASE_ROTATION_SPEED;

        // Cargar GeoJSON y procesar Bermuda
        fetch('/static/countries.geojson')
            .then(res => res.json())
            .then(countries => {

                // FILTRO TÁCTICO: Eliminamos Bermuda para evitar el bloqueo del globo
                const cleanFeatures = countries.features.filter(f => f.id !== 'BMU' && f.properties.ISO_A3 !== 'BMU');
                world.polygonsData(cleanFeatures);
            });

        function selectNode(name, code, lat, lng) {
            selectedCountry = code;
            document.getElementById('node-label').innerText = `NODE: ${name}`;
            document.getElementById('back-button').style.display = 'block';
            
            world.pointOfView({ lat, lng, altitude: 1.5 }, 1000);
            world.controls().autoRotateSpeed = BASE_ROTATION_SPEED * 0.75;
            
            loadNews(code);
        }

        function loadNews(code) {
            const container = document.getElementById('news-container');
            container.innerHTML = `<div class="status-line">> ACCEDIENDO A SECTOR ${code}...</div>`;
            
            fetch(`/country-news?country=${code}`)
                .then(res => res.json())
                .then(data => {
                    container.innerHTML = '';
                    data.articles.forEach(art => {
                        const div = document.createElement('div');
                        div.className = 'news-item';
                        div.innerHTML = `> ${art.title}`;
                        div.onclick = () => openReader(art);
                        container.appendChild(div);
                    });
                });
        }

        function openReader(article) {
            const reader = document.getElementById('news-reader');
            const body = document.getElementById('reader-body');
            reader.style.display = 'flex';
            body.innerHTML = `
                <p><strong>ORIGEN:</strong> ${article.source.name || 'Unknown'}</p>
                <p>> ${article.description || 'Sin resumen disponible.'}</p>
                <a href="${article.url}" target="_blank" class="news-link">ACCEDER_A_FUENTE_EXTERNA ></a>
            `;
        }

        function closeReader() { document.getElementById('news-reader').style.display = 'none'; }

        function resetToGlobal() {
            selectedCountry = null;
            closeReader();
            document.getElementById('node-label').innerText = `NODE: GLOBAL FEED`;
            document.getElementById('back-button').style.display = 'none';
            world.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 1000);
            world.controls().autoRotateSpeed = BASE_ROTATION_SPEED;
            loadNews('global');
        }

        window.onload = () => resetToGlobal();
    </script>
</body>
</html>
