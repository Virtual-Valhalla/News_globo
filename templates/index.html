<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_V.1 - GEO-SCANNER</title>
    <!-- 🌐 Librería para renderizar globos terráqueos 3D interactivos -->
    <script src="//unpkg.com/globe.gl"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- 🌍 GLOBO 3D INTERACTIVO                                             -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div id="globeViz"></div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- 📋 PANEL DE CONSOLA DE ERRORES                                      -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div id="error-console" class="error-console">
        <div class="console-header">
            <span>CONSOLE</span>
            <div class="console-buttons">
                <button class="console-btn" onclick="clearConsole()">LIMPIAR</button>
                <button class="console-btn" id="collapse-btn" onclick="toggleConsole()">−</button>
            </div>
        </div>
        <div id="console-content" class="console-content">
            <div class="console-message msg-info">
                <span class="console-time">[--:--:--]</span>
                <span class="console-type">ℹ️ INFO</span>
                <span>Sistema iniciado. Esperando eventos...</span>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- 📱 TERMINAL PRINCIPAL - LISTA DE NOTICIAS                           -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div class="terminal-box">
        <div class="terminal-box-header">
            <span>NEWS_TERMINAL</span>
            <div class="terminal-box-buttons">
                <button class="terminal-box-btn" onclick="toggleTerminal()">−</button>
            </div>
        </div>
        <div class="terminal-box-header2">
            <div class="terminal-boxmsg-info">STATUS: <span class="active">ACTIVE</span></div>
            <div id="node-label" class="terminal-boxmsg-info">NODE: <span id="node-label" class="terminal-boxmsg-success">GLOBAL_FEED</span></div>
        </div>
        <div class="terminal-box-header2">
            <button id="back-button" class="back-btn" onclick="resetToGlobal()">> RESET_CAMERA</button>
        </div>
        <div id="terminal-content" class="terminal-box-status">
             <!-- 📰 Contenido dinámico de noticias -->
            <div id="news-container" class="terminal-box-content">
                <div class="terminal-boxmsg-warning">> ESCANEANDO...</div>
            </div>
        </div>
    </div>

    <!-- ════════════════════════════════════════════════════════════════════ -->
    <!-- 📄 CONSOLA DE LECTURA - ARTÍCULO COMPLETO                           -->
    <!-- ════════════════════════════════════════════════════════════════════ -->
    <div id="news-reader" class="reader-box">
        <div class="reader-header">
            <span>DATA_DECRYPTOR_V.1</span>
            <span class="close-btn" onclick="closeReader()">[X]</span>
        </div>
        <div id="reader-body" class="reader-content">
            <!-- 📝 Contenido dinámico de la noticia -->
        </div>
    </div>
<!-- ============================= -->
<!-- VISOR DE ARTÍCULOS -->
<!-- ============================= -->
<div id="articleViewer" style="
    position: absolute;
    top: 50px;
    right: 20px;
    width: 400px;
    height: 80%;
    overflow-y: auto;
    background: rgba(0,0,0,0.85);
    color: #00ffff;
    padding: 15px;
    border: 1px solid #00ffff;
    font-family: monospace;
    display: none;
">
</div>
    <!-- Cargamos nuestra lógica separada -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
